# STM32H750B-DK — flash size override (H750 silicon, treated as H743 Bank 1)
#
# Uses stlink-dap.cfg + dapdirect_swd to match how CubeIDE launches OpenOCD.
# With hla_swd, swj_newdap calls hla newtap which startup.tcl remaps back to
# swj_newdap — infinite recursion. dapdirect_swd avoids this by taking the
# swd newdap path instead.
#
# Run with:
#   -s <project>/openocd_scripts   (contains patched stm32h7x.cfg, 1MB flash bank)
#   -s <cubeide>/st_scripts        (contains swj-dp.tcl, mem_helper.tcl, etc.)

source [find interface/stlink-dap.cfg]
transport select dapdirect_swd

set CHIPNAME STM32H750XBHx
set BOARDNAME stm32h750b-dk
set WORKAREASIZE 0x8000
set ENABLE_LOW_POWER 0
set STOP_WATCHDOG 0
set CLOCK_FREQ 4000
set CONNECT_UNDER_RESET 0
set CORE_RESET 0
set AP_NUM 0
set GDB_PORT 3333

source [find target/stm32h7x.cfg]

reset_config none
